server:
  port: 8080
  address: 0.0.0.0

management:
  server:
    port: 8081
    address: 0.0.0.0
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
      base-path: /actuator
  endpoint:
    prometheus:
      enabled: true

logging:
  level:
    root: WARN
    ru.polyrythms: INFO
  file:
    name: /app/logs/auth-service.log
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 30