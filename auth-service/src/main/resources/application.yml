spring:
  application:
    name: auth-service

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always

jwt:
  ttl-seconds: 3600

internal:
  auth:
    key: ${INTERNAL_API_KEY:changeit}