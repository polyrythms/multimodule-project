name: Build and Deploy

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_TELEGRAM_BOT: ${{ github.repository }}/telegram-bot
  IMAGE_NAME_AUDIO_SERVICE: ${{ github.repository }}/audio-service

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Maven dependencies
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Run tests
        run: mvn clean test

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Telegram Bot
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./telegram-bot/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_TELEGRAM_BOT }}:latest,${{ env.REGISTRY }}/${{ env.IMAGE_NAME_TELEGRAM_BOT }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Audio Service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./audio-service/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_AUDIO_SERVICE }}:latest,${{ env.REGISTRY }}/${{ env.IMAGE_NAME_AUDIO_SERVICE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/multimodule-project
      
            # 🔧 ФИКС: Сбрасываем права перед git операциями
            echo "🔧 Fixing permissions..."
            chown -R root:root . 2>/dev/null || true
            git config --global --add safe.directory /opt/multimodule-project
            
            # 1. ИНИЦИАЛИЗАЦИЯ GIT
            if [ ! -d .git ]; then
              echo "📁 Initializing git repository..."
              rm -rf .git 2>/dev/null || true
              git init
              git remote add origin https://github.com/polyrythms/multimodule-project.git
              git fetch origin
              git reset --hard origin/main
            else
              echo "🔄 Updating repository..."
              # Удаляем проблемные файлы
              git clean -fd
              git reset --hard HEAD
              git fetch origin
              git reset --hard origin/main
            fi
            
            # ============================================
            # 2. ЛОГИН В GHCR
            # ============================================
            echo "🔐 Logging into GitHub Container Registry..."
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # ============================================
            # 3. ПОДГОТОВКА ДИРЕКТОРИЙ
            # ============================================
            echo "📁 Creating directories..."
            mkdir -p nginx/ssl logs/telegram-bot logs/audio-service
            
            # ============================================
            # 4. PULL ОБРАЗОВ
            # ============================================
            echo "🐳 Pulling latest images..."
            docker compose -f docker-compose.prod.yml pull
            
            # ============================================
            # 5. ОСТАНОВКА СТАРЫХ КОНТЕЙНЕРОВ
            # ============================================
            echo "🛑 Stopping old containers..."
            docker compose -f docker-compose.prod.yml down 2>/dev/null || true
            docker compose -f docker-compose.apps.yml down 2>/dev/null || true
            docker compose -f docker-compose-monitoring.yml down 2>/dev/null || true
            
            # ============================================
            # 6. ЗАПУСК СЕРВИСОВ
            # ============================================
            echo "🚀 Starting services..."
            docker compose -f docker-compose.yml up -d minio zookeeper kafka kafdrop
            docker compose -f docker-compose.apps.yml up -d telegram-bot audio-service
            docker compose -f docker-compose.prod.yml up -d nginx
            docker compose -f docker-compose-monitoring.yml up -d prometheus 2>/dev/null || true
            
            # ============================================
            # 7. ПРОВЕРКА СТАТУСА
            # ============================================
            echo "⏳ Waiting for services to be ready..."
            sleep 15
            
            echo "📊 Service status:"
            docker ps --filter "status=running" --format "table {{.Names}}\t{{.Status}}"
            
            # Проверка Nginx
            if docker ps | grep -q nginx; then
              echo "🔍 Testing nginx configuration..."
              docker exec nginx nginx -t
              echo "✅ Nginx is running"
            else
              echo "❌ Nginx is not running. Checking logs..."
              docker compose -f docker-compose.prod.yml logs nginx --tail 20
            fi
            
            # Проверка бота
            if docker ps | grep -q telegram-bot; then
              echo "✅ Telegram bot is running"
            else
              echo "❌ Telegram bot is not running. Checking logs..."
              docker compose -f docker-compose.apps.yml logs telegram-bot --tail 20
            fi
            
            # ============================================
            # 8. ОЧИСТКА
            # ============================================
            echo "🧹 Cleaning up old images..."
            docker image prune -f
            
            echo "✅ Deployment completed successfully!"