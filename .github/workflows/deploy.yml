name: Build and Deploy

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_TELEGRAM_BOT: ${{ github.repository }}/telegram-bot
  IMAGE_NAME_AUDIO_SERVICE: ${{ github.repository }}/audio-service

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Maven dependencies
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Run tests
        run: mvn clean test

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Telegram Bot
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./telegram-bot/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_TELEGRAM_BOT }}:latest,${{ env.REGISTRY }}/${{ env.IMAGE_NAME_TELEGRAM_BOT }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Audio Service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./audio-service/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_AUDIO_SERVICE }}:latest,${{ env.REGISTRY }}/${{ env.IMAGE_NAME_AUDIO_SERVICE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main')

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/multimodule-project
            
            # ✅ ДОБАВЛЯЕМ git pull для обновления конфигов и кода
            echo "🔄 Updating repository..."
            git pull origin main
            
            # ✅ Обновляем nginx.conf если изменился
            echo "📁 Checking nginx configuration..."
            if [ -f nginx/nginx.conf ]; then
              docker exec nginx nginx -t 2>/dev/null || echo "⚠️ Nginx config check skipped (container not running)"
            fi
            
            # Pull latest images
            echo "🐳 Pulling latest images..."
            docker compose -f docker-compose.prod.yml pull
            
            # Create necessary directories
            mkdir -p nginx/ssl logs/telegram-bot logs/audio-service
            
            # Generate self-signed SSL certificate for testing (replace with Let's Encrypt in production)
            if [ ! -f nginx/ssl/nginx.crt ]; then
              echo "🔐 Generating SSL certificate..."
              openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
                -keyout nginx/ssl/nginx.key \
                -out nginx/ssl/nginx.crt \
                -subj "/CN=polyrythms.ru"
            fi
            
            # Stop old containers
            echo "🛑 Stopping old containers..."
            docker compose -f docker-compose.prod.yml down
            
            # Start services with updated configs
            echo "🚀 Starting services..."
            docker compose -f docker-compose.yml up -d minio zookeeper kafka kafdrop
            docker compose -f docker-compose.apps.yml up -d telegram-bot audio-service
            docker compose -f docker-compose.prod.yml up -d nginx
            docker compose -f docker-compose-monitoring.yml up -d
            
            # Wait for services to be healthy
            sleep 30
            
            # Check service health
            echo "📊 Service status:"
            docker ps --filter "status=running" --format "table {{.Names}}\t{{.Status}}"
            
            # Test nginx configuration
            echo "🔍 Testing nginx..."
            docker exec nginx nginx -t
            
            # Clean up old images
            echo "🧹 Cleaning up old images..."
            docker image prune -f
            
            echo "✅ Deployment completed successfully!"