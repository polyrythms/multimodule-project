name: Build and Deploy

on:
  push:
    branches: [ main, MM-refactor ]
  workflow_dispatch:
  pull_request:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run tests
        run: mvn clean test

  build:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service: [telegram-bot, audio-service]
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Docker layers
        uses: actions/cache@v3
        with:
          path: /tmp/.buildx-cache-${{ matrix.service }}
          key: ${{ runner.os }}-buildx-${{ matrix.service }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-${{ matrix.service }}-
            ${{ runner.os }}-buildx-

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./${{ matrix.service }}/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=local,src=/tmp/.buildx-cache-${{ matrix.service }}
          cache-to: type=local,dest=/tmp/.buildx-cache-${{ matrix.service }}-new,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/MM-refactor'
    environment: production

    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 30m
          script: |
            set -e
            cd /opt/multimodule-project
            
            echo "=== Creating network ==="
            docker network create app-network 2>/dev/null || true
            
            echo "=== Logging to GHCR ==="
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            echo "=== Pulling images for production ==="
            # Сначала пуллим образы из GHCR (они указаны в prod.yml)
            docker compose -f docker-compose.apps.yml -f docker-compose.prod.yml pull
            
            echo "=== Starting services ==="
            # Запускаем с объединением обоих файлов
            # prod.yml переопределяет build на image для telegram-bot и audio-service
            docker compose -f docker-compose.apps.yml -f docker-compose.prod.yml up -d --remove-orphans
            
            echo "=== Cleaning up old images ==="
            docker image prune -f
            
            echo "=== Checking containers status ==="
            docker compose -f docker-compose.apps.yml -f docker-compose.prod.yml ps
            
            echo "=== Waiting for services to start ==="
            sleep 30
            
            echo "=== Health checks ==="
            echo "Testing audio service..."
            curl -f http://localhost:8081/actuator/health && echo "✅ Audio service healthy" || echo "❌ Audio service health check failed"
            
            echo "Testing telegram bot..."
            curl -f http://localhost:8082/actuator/health && echo "✅ Telegram bot healthy" || echo "❌ Telegram bot health check failed"
            
            echo "=== Deploy completed ==="