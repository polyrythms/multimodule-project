events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 50M;

    # Логирование
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_origin"';
    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log;

    # CORS настройки - разрешаем GitHub Pages
    map $http_origin $cors_origin {
        default "";
        "https://polyrythms.github.io" "$http_origin";
        "https://polyrythms.github.io/weather-report" "$http_origin";
        "http://localhost:3000" "$http_origin";
        "http://localhost:8080" "$http_origin";
    }

    # HTTP -> HTTPS перенаправление
    server {
        listen 80;
        listen [::]:80;
        server_name polyrythms.duckdns.org;

        location / {
            return 301 https://$server_name$request_uri;
        }

        # Для Let's Encrypt renewal
        location ^~ /.well-known/acme-challenge/ {
            root /var/www/html;
        }
    }

    # HTTPS сервер
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name polyrythms.duckdns.org;

        ssl_certificate /etc/nginx/ssl/nginx.crt;
        ssl_certificate_key /etc/nginx/ssl/nginx.key;
        ssl_session_timeout 1d;
        ssl_session_cache shared:SSL:50m;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        # CORS заголовки
        add_header 'Access-Control-Allow-Origin' $cors_origin always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Accept, X-Requested-With' always;
        add_header 'Access-Control-Expose-Headers' 'Authorization' always;

        # Обработка preflight запросов
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' $cors_origin;
            add_header 'Access-Control-Allow-Credentials' 'true';
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Accept, X-Requested-With';
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Length' 0;
            return 204;
        }

        # Healthcheck
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # API для Web App
        location /api/ {
            # Здесь будут прокси на auth-service и weather-service
            # Пока возвращаем заглушку
            return 404;
        }

        # Метрики (только с localhost)
        location /metrics {
            allow 127.0.0.1;
            deny all;
            return 404;
        }
    }
}