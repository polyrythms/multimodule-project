services:
  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # webapp volume УБРАН - фронт на GitHub Pages
      - # Монтируем сертификаты напрямую из Let's Encrypt
      - /etc/letsencrypt/live/polyrythms.duckdns.org/fullchain.pem:/etc/nginx/ssl/nginx.crt:ro
      - /etc/letsencrypt/live/polyrythms.duckdns.org/privkey.pem:/etc/nginx/ssl/nginx.key:ro
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  telegram-bot:
    image: ghcr.io/polyrythms/multimodule-project/telegram-bot:latest
    env_file: .env
    environment:
      SPRING_PROFILES_ACTIVE: prod
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: "health,info,prometheus,metrics,env"
      MANAGEMENT_ENDPOINT_PROMETHEUS_ENABLED: "true"
      MANAGEMENT_METRICS_EXPORT_PROMETHEUS_ENABLED: "true"
      SERVICE_NAME: telegram-bot
      MANAGEMENT_SERVER_PORT: 8081
      # Добавляем URL для Web App
      WEATHER_WEBAPP_URL: "https://polyrythms.github.io/weather-report"
      SERVER_IP: ${SERVER_HOST}
    volumes:
      - ./logs/telegram-bot:/app/logs
    networks:
      - app-network
    restart: unless-stopped

  audio-service:
    image: ghcr.io/polyrythms/multimodule-project/audio-service:latest
    env_file: .env
    environment:
      SPRING_PROFILES_ACTIVE: prod
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: "health,info,prometheus,metrics,env"
      MANAGEMENT_ENDPOINT_PROMETHEUS_ENABLED: "true"
      MANAGEMENT_METRICS_EXPORT_PROMETHEUS_ENABLED: "true"
      SERVICE_NAME: audio-service
      MANAGEMENT_SERVER_PORT: 8081
    volumes:
      - ./logs/audio-service:/app/logs
    networks:
      - app-network
    restart: unless-stopped

networks:
  app-network:
    external: true
    name: app-network