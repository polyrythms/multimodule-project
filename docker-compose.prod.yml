services:
  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt/live/polyrythms.duckdns.org/fullchain.pem:/etc/nginx/ssl/nginx.crt:ro
      - /etc/letsencrypt/live/polyrythms.duckdns.org/privkey.pem:/etc/nginx/ssl/nginx.key:ro
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  telegram-bot:
    image: ghcr.io/polyrythms/multimodule-project/telegram-bot:latest
    container_name: multimodule-project-telegram-bot
    env_file: .env
    environment:
      SPRING_PROFILES_ACTIVE: prod
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: "health,info,prometheus,metrics,env"
      MANAGEMENT_ENDPOINT_PROMETHEUS_ENABLED: "true"
      MANAGEMENT_METRICS_EXPORT_PROMETHEUS_ENABLED: "true"
      SERVICE_NAME: telegram-bot
      MANAGEMENT_SERVER_PORT: 8081
      WEATHER_WEBAPP_URL: "https://polyrythms.github.io/weather-report"
      SERVER_IP: ${SERVER_HOST}
    expose:
      - "8080"
      - "8081"
    volumes:
      - ./logs/telegram-bot:/app/logs
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  audio-service:
    image: ghcr.io/polyrythms/multimodule-project/audio-service:latest
    container_name: multimodule-project-audio-service
    env_file: .env
    environment:
      SPRING_PROFILES_ACTIVE: prod
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: "health,info,prometheus,metrics,env"
      MANAGEMENT_ENDPOINT_PROMETHEUS_ENABLED: "true"
      MANAGEMENT_METRICS_EXPORT_PROMETHEUS_ENABLED: "true"
      SERVICE_NAME: audio-service
      MANAGEMENT_SERVER_PORT: 8081
    expose:
      - "8080"
      - "8081"
    volumes:
      - ./logs/audio-service:/app/logs
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/actuator/health"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 120s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  auth-service:
    image: ghcr.io/polyrythms/multimodule-project/auth-service:latest
    container_name: multimodule-project-auth-service
    env_file: .env
    environment:
      SPRING_PROFILES_ACTIVE: prod
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: "health,info,prometheus,metrics,env"
      MANAGEMENT_ENDPOINT_PROMETHEUS_ENABLED: "true"
      MANAGEMENT_METRICS_EXPORT_PROMETHEUS_ENABLED: "true"
      SERVICE_NAME: auth-service
      MANAGEMENT_SERVER_PORT: 8081
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY:-}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY:-}
    expose:
      - "8080"   # основной порт приложения
      - "8081"   # порт метрик
    volumes:
      - ./logs/auth-service:/app/logs
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  weather-service:
    image: ghcr.io/polyrythms/multimodule-project/weather-service:latest
    container_name: multimodule-project-weather-service
    env_file: .env
    environment:
      SPRING_PROFILES_ACTIVE: prod
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: "health,info,prometheus,metrics,env"
      MANAGEMENT_ENDPOINT_PROMETHEUS_ENABLED: "true"
      MANAGEMENT_METRICS_EXPORT_PROMETHEUS_ENABLED: "true"
      SERVICE_NAME: weather-service
      MANAGEMENT_SERVER_PORT: 8081
      OPENWEATHERMAP_API_KEY: ${OPENWEATHERMAP_API_KEY}
    expose:
      - "8080"
      - "8081"
    volumes:
      - ./logs/weather-service:/app/logs
      - ./data/weather-service:/app/data   # для H2 базы
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"


networks:
  app-network:
    external: true
    name: app-network