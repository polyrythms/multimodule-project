services:
  telegram-bot:
    build:
      context: .
      dockerfile: telegram-bot/Dockerfile
    env_file: .env
    environment:
      SERVICE_NAME: telegram-bot
      SPRING_PROFILES_ACTIVE: prod
      SPRING_CONFIG_LOCATION: "classpath:/,file:/app/resources/"
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: "health,info"
      MANAGEMENT_ENDPOINT_HEALTH_SHOW-DETAILS: "always"
      # Для метрик используем отдельный порт
      MANAGEMENT_SERVER_PORT: 8081
    # Убираем ports - только внутренний доступ
    expose:
      - "8080"  # Основной порт приложения
      - "8081"  # Метрики
    volumes:
      - ./telegram-bot/logs:/app/logs
      - ./telegram-bot/src/main/resources/:/app/resources/
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  audio-service:
    build:
      context: .
      dockerfile: audio-service/Dockerfile
    env_file: .env
    environment:
      SPRING_PROFILES_ACTIVE: prod
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: "health,info"
      MANAGEMENT_ENDPOINT_HEALTH_SHOW-DETAILS: "always"
      SERVICE_NAME: audio-service
      MANAGEMENT_SERVER_PORT: 8081
    # Убираем ports - только внутренний доступ
    expose:
      - "8080"  # Основной порт приложения
      - "8081"  # Метрики
    volumes:
      - ./audio-service/logs:/app/logs
      - ./audio-service/src/main/resources/:/app/resources/
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/actuator/health"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 120s
    restart: unless-stopped

networks:
  app-network:
    external: true
    name: app-network