spring:
  kafka:
    bootstrap-servers: kafka:29092
    consumer:
      group-id: telegram-bot-group-prod
      auto-offset-reset: latest
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      retries: 3

minio:
  url: http://minio:9000
  access-key: ${MINIO_ROOT_USER}
  secret-key: ${MINIO_ROOT_PASSWORD}
  bucket: audio-bucket-prod

telegram:
  bot:
    username: ${TELEGRAM_BOT_USERNAME}
    token: ${TELEGRAM_BOT_TOKEN}


weather:
  webapp:
    url: ${WEATHER_WEBAPP_URL}

# Настройки для разделения портов
server:
  port: 8080
  address: 0.0.0.0

management:
  server:
    port: 8081
    address: 0.0.0.0
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
      base-path: /actuator
  endpoint:
    health:
      show-details: always
    prometheus:
      enabled: true

logging:
  level:
    root: WARN
    ru.polyrythms: INFO
  file:
    name: /app/logs/telegram-bot.log
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 30

auth:
  service:
    url: http://auth-service:8080